<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Библиотека!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <p class="header-logo"><a href="/">Б!</a></p>
        <ul class="header-menu">
            <li><a href="/books">Все доступные книги</a></li>
            {% if g.user %}
                <li><a href="/profile">Ваш прогресс</a></li>
                <li><a href="/logout">Выйти</a></li>
                {% if g.user.is_admin == 1 %}
                    <li><a href="/add_book">Добавить новую книгу</a></li>
                    <li><a href="/edit_book">Отредактировать книгу</a></li>
                {% endif %}
            {% else %}
                <li><a href="/login">Войти</a></li>
                <li><a href="/register">Зарегистрироваться</a></li>
            {% endif %}
        </ul>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
