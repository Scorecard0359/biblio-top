{% extends 'base.html' %}

{% block title %}Добавление книги{% endblock %}

{% block content %}
    {% if notify %}
        <p>{{ notify }}</p>
    {% endif %}
    <form method="post">
        <p><label for="title">Название:</label> <input type="text" name="title" id="title"></p>
        <p><label for="year">Год выпуска:</label> <input type="text" name="year" id="year"></p>
        <p><label for="author">Автор:</label> <input type="text" name="author" id="author"></p>
        <p><label for="max_pages">Количество страниц:</label> <input type="text" name="max_pages" id="max_pages"></p>
        <p><label for="description">Описание:</label> <textarea name="description" id="description" cols="30" rows="10"></textarea></p>
        <p><label for="artwork">URL-адрес обложки:</label> <input type="text" name="artwork" id="artwork"></p>
        <p><input type=submit value=Отправить></p>
    </form>
{% endblock %}
