{% extends 'base.html' %}

{% block title %}Редактирование книги{% endblock %}

{% block content %}
    <h1>Выберите книгу из каталога:</h1>
    <div class="book-content">
        {% for book in books %}
            <div class="books-item">
                <div class="book-art">
                    <a href="/edit_book/{{ book.book_id }}">
                        <img src="{% if book.artwork %}{{ book.artwork }}{% else %}{{ url_for('static', filename='blank.png') }}{% endif %}">
                        <span class="book-info">
                            {{ book.title }} ({{ book.year }} год)
                        </span>
                    </a>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
